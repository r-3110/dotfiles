name: Sync renovate-pr to main

on:
  push:
    branches:
      - main

jobs:
  sync:
    if: contains(toJson(github.event.commits), 'renovate-pr')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Reset renovate-pr to main
        run: git push --force origin HEAD:renovate-pr
