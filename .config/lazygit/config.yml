# https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
gui:
  language: ja
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
customCommands:
  - key: "D"
    context: "localBranches"
    command: >
      git fetch origin &&
      git rebase $(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
    description: "Rebase onto default branch"
  - key: "C"
    command: 'git commit -m "{{ .Form.Type }}{{if .Form.Scopes}}({{ .Form.Scopes }}){{end}}{{if eq .Form.Breaking `yes`}}!{{end}}: {{ .Form.Description }}"'
    description: "commit with commitizen"
    context: "files"
    prompts:
      - type: "menu"
        title: "コミットする変更の種類を選んでください:"
        key: "Type"
        options:
          - name: "Feature"
            description: "A new feature"
            value: "feat"
          - name: "Fix"
            description: "A bug fix"
            value: "fix"
          - name: "Documentation"
            description: "Documentation only changes"
            value: "docs"
          - name: "Styles"
            description: "Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc)"
            value: "style"
          - name: "Code Refactoring"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "Performance Improvements"
            description: "A code change that improves performance"
            value: "perf"
          - name: "Tests"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
          - name: "Builds"
            description: "Changes that affect the build system or external dependencies (example scopes: gulp, broccoli, npm)"
            value: "build"
          - name: "Continuous Integration"
            description: "Changes to our CI configuration files and scripts (example scopes: Travis, Circle, BrowserStack, SauceLabs)"
            value: "ci"
          - name: "Chores"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "Reverts"
            description: "Reverts a previous commit"
            value: "revert"
      - type: "menu"
        title: "この変更のスコープを入力してください（任意）:"
        key: "Scopes"
        options:
          - name: "app"
            description: "アプリ全体・主要な実行コード"
            value: "app"
          - name: "ui"
            description: "画面・コンポーネント・見た目"
            value: "ui"
          - name: "api"
            description: "HTTP/API 境界・エンドポイント"
            value: "api"
          - name: "auth"
            description: "認証・認可・セッション"
            value: "auth"
          - name: "data"
            description: "データモデル・永続化・DB・マイグレーション"
            value: "data"
          - name: "state"
            description: "状態管理・キャッシュ・同期"
            value: "state"
          - name: "config"
            description: "設定・環境変数・ツール設定"
            value: "config"
          - name: "deps"
            description: "依存関係・ロックファイル"
            value: "deps"
          - name: "build"
            description: "ビルド・バンドル・パッケージング"
            value: "build"
          - name: "ci"
            description: "CI/CD・自動化"
            value: "ci"
          - name: "docs"
            description: "ドキュメント"
            value: "docs"
          - name: "test"
            description: "テスト・テスト補助"
            value: "test"
      - type: "input"
        title: "変更内容を簡潔に書いてください (命令形・短め):"
        key: "Description"
      - type: "menu"
        title: "この変更は破壊的変更を含みますか？"
        key: "Breaking"
        options:
          - name: "No"
            description: "この変更は破壊的変更を含みません。"
            value: "no"
          - name: "Yes"
            description: "この変更は破壊的変更を含みます。"
            value: "yes"
      - type: "confirm"
        title: "コミットメッセージは正しいですか？"
        body: "{{ .Form.Type }}{{if .Form.Scopes}}({{ .Form.Scopes }}){{end}}{{if eq .Form.Breaking `yes`}}!{{end}}: {{ .Form.Description }}"
