
# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Other examples:
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'laktak/extrakto'
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# vi like key bindings for tmux
set-window-option -g mode-keys vi

# layout
set -g @tmux_power_theme 'moon'
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

# Use Alt + q to open the editprompt in a new pane, or resume it if it's already open
bind -n M-q run-shell '\
  editprompt resume --target-pane #{pane_id} || \
  tmux split-window -v -l 10 -c "#{pane_current_path}" \
    "editprompt open --editor nvim --always-copy --target-pane #{pane_id}"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/go/bin/tpack init'
